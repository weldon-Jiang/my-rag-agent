<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地知识库智能体</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/content-renderer.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 智能体</h1>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">AI对话</span>
                </div>
                <div class="nav-item" data-page="knowledge">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">知识库</span>
                </div>
                <div class="nav-item" data-page="skill-tools">
                    <span class="nav-icon">🛠️</span>
                    <span class="nav-text">技能工具</span>
                </div>
                <div class="nav-item" data-page="models">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">模型管理</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-switcher">
                    <button class="theme-btn active" data-theme="system">系统</button>
                    <button class="theme-btn" data-theme="light">浅色</button>
                    <button class="theme-btn" data-theme="dark">深色</button>
                </div>
            </div>
        </aside>

        <main class="main-area">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h2 class="page-title" id="pageTitle">AI对话</h2>
                </div>
                <div class="top-bar-right">
                    <div id="modelSelectWrapper"></div>
                </div>
            </header>
            <div class="content-wrapper">
                <div id="pageContainer"></div>
            </div>
        </main>
    </div>

    <div id="modalContainer"></div>

    <script src="router/router.js"></script>
    <script src="utils/content-renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
