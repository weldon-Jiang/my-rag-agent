<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地知识库智能体</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 本地知识库智能体</h1>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme="system">跟随系统</button>
                <button class="theme-btn" data-theme="light">浅色</button>
                <button class="theme-btn" data-theme="dark">深色</button>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="menu-item active" data-page="chat">
                    <span class="menu-icon">💬</span>
                    <span>AI对话</span>
                </div>
                <div class="menu-item" data-page="knowledge">
                    <span class="menu-icon">📚</span>
                    <span>知识库管理</span>
                </div>
                <div class="menu-item" data-page="models">
                    <span class="menu-icon">⚙️</span>
                    <span>模型管理</span>
                </div>
            </div>

            <div class="content-area">
                <div id="chatPage" class="page active">
                    <div class="chat-top-controls">
                        <div class="mode-buttons">
                            <button class="mode-btn" data-mode="knowledge">仅知识库</button>
                            <button class="mode-btn" data-mode="ai">仅AI</button>
                            <button class="mode-btn active" data-mode="hybrid">混合</button>
                        </div>
                        <div id="modelSelectWrapper"></div>
                    </div>
                    <div id="chatMessages" class="chat-messages"></div>
                    
                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea id="chatInput" placeholder="输入你的问题... (Shift+Enter换行)" rows="3"></textarea>
                            <button id="sendBtn">发送</button>
                        </div>
                        <div class="attachments" id="attachments"></div>
                    </div>
                </div>

                <div id="knowledgePage" class="page">
                    <h2>📚 知识库管理</h2>
                    <div class="upload-area">
                        <div class="upload-dropzone" id="uploadDropzone">
                            <div class="dropzone-content">
                                <div class="dropzone-icon">📁</div>
                                <p>点击选择文件或拖拽文件到此处</p>
                                <p class="dropzone-hint">单个文件不超过100MB</p>
                                <input type="file" id="fileInput" multiple style="display: none;">
                            </div>
                        </div>
                        <div class="selected-files" id="selectedFiles"></div>
                        <button id="uploadBtn" class="upload-btn" disabled>上传文件</button>
                    </div>
                    <div id="uploadProgress" class="upload-progress"></div>
                    <div id="fileList" class="file-list"></div>
                </div>

                <div id="modelsPage" class="page">
                    <h2>⚙️ 模型管理</h2>
                    <div class="models-header">
                        <button id="openAddModelModalBtn" class="add-model-btn">+ 新增模型</button>
                    </div>
                    <div id="modelsList" class="models-list"></div>
                </div>

                <div id="modelModal" class="modal">
                    <div class="modal-content">
                        <span class="modal-close">&times;</span>
                        <h3 id="modelModalTitle">新增模型</h3>
                        <div class="form-group">
                            <label for="modalModelName">模型名称</label>
                            <input type="text" id="modalModelName" placeholder="请输入模型名称">
                        </div>
                        <div class="form-group">
                            <label for="modalModelId">模型ID</label>
                            <input type="text" id="modalModelId" placeholder="请输入模型ID">
                        </div>
                        <div class="form-group">
                            <label for="modalModelUrl">API URL</label>
                            <input type="text" id="modalModelUrl" placeholder="请输入API URL">
                        </div>
                        <div class="form-group">
                            <label for="modalModelKey">API密钥</label>
                            <input type="text" id="modalModelKey" placeholder="请输入API密钥">
                        </div>
                        <div class="form-group">
                            <label for="modalModelProvider">供应商</label>
                            <input type="text" id="modalModelProvider" placeholder="请输入供应商">
                        </div>
                        <div class="form-group">
                            <label for="modalModelPublished">
                                <input type="checkbox" id="modalModelPublished" checked>
                                发布状态（勾选后可在对话中使用）
                            </label>
                        </div>
                        <div class="modal-buttons">
                            <button id="saveModelBtn" class="save-btn">保存</button>
                            <button id="cancelModelBtn" class="cancel-btn">取消</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
