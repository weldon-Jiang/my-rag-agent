<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地知识库智能体</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/content-renderer.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 本地知识库智能体</h1>
            <nav class="top-nav">
                <div class="menu-item active" data-page="chat">
                    <span class="menu-icon">💬</span>
                    <span>AI对话</span>
                </div>
                <div class="menu-item" data-page="knowledge">
                    <span class="menu-icon">📚</span>
                    <span>知识库管理</span>
                </div>
                <div class="menu-item" data-page="skill-tools">
                    <span class="menu-icon">🛠️</span>
                    <span>技能工具管理</span>
                </div>
                <div class="menu-item" data-page="models">
                    <span class="menu-icon">⚙️</span>
                    <span>模型管理</span>
                </div>
            </nav>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme="system">跟随系统</button>
                <button class="theme-btn" data-theme="light">浅色</button>
                <button class="theme-btn" data-theme="dark">深色</button>
            </div>
        </header>

        <div class="main-content">
            <div class="content-area">
                <div id="pageContainer"></div>
            </div>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script src="router/router.js"></script>
    <script src="utils/content-renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
